<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="64" fill="#1a1d27"/>
  <!-- clapper arm -->
  <rect x="32" y="32" width="448" height="144" fill="#6366f1"/>
  <!-- diagonal white stripes over arm -->
  <clipPath id="arm">
    <rect x="32" y="32" width="448" height="144"/>
  </clipPath>
  <g clip-path="url(#arm)">
    <polygon points="-80,32 -20,32 124,176 64,176"   fill="white" opacity="0.85"/>
    <polygon points=" 60,32 120,32 264,176 204,176"  fill="white" opacity="0.85"/>
    <polygon points="200,32 260,32 404,176 344,176"  fill="white" opacity="0.85"/>
    <polygon points="340,32 400,32 544,176 484,176"  fill="white" opacity="0.85"/>
  </g>
  <!-- hinge line -->
  <rect x="32" y="174" width="448" height="8" fill="#2e3347"/>
  <!-- board body -->
  <rect x="32" y="196" width="448" height="284" rx="10" fill="none" stroke="#2e3347" stroke-width="8"/>
  <!-- slate lines -->
  <line x1="48" y1="291" x2="464" y2="291" stroke="#2e3347" stroke-width="6"/>
  <line x1="48" y1="386" x2="464" y2="386" stroke="#2e3347" stroke-width="6"/>
</svg>

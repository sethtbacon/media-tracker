services:
  backend:
    build: ./backend
    expose:
      - "8000"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/media.db
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "${PORT:-7878}:80"
    depends_on:
      - backend
    restart: unless-stopped
